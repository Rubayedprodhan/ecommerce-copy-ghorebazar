{% load static %}


<div class="container my-4">
    <div class="row g-3">
        <div class="col-lg-8">
            <div id="heroCarousel" class="carousel slide shadow-sm rounded-4 overflow-hidden" data-bs-ride="carousel">
                <div class="carousel-indicators custom-dots">
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="3"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{% static 'images/bannar1.jpg' %}" class="d-block w-100" alt="Banner 1">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'images/bannar2.png' %}" class="d-block w-100" alt="Banner 2">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'images/bannar3.jpeg' %}" class="d-block w-100" alt="Banner 3">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'images/bannar4.jpeg' %}" class="d-block w-100" alt="Banner 4">
                    </div>
                </div>
             
                <button class="carousel-control-prev custom-nav" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                    <span class="fas fa-arrow-left"></span>
                </button>
                <button class="carousel-control-next custom-nav" type="button" data-bs-target="#heroCarousel" data-bs-slide-to="next">
                    <span class="fas fa-arrow-right"></span>
                </button>
            </div>
        </div>

        <div class="col-lg-4 d-none d-lg-block">
            <div class="promo-banner shadow-sm rounded-4 overflow-hidden h-100">
                <img src="{% static 'images/leftbannar.png' %}" class="img-fluid h-100 object-fit-cover" alt="Special Promo">
            </div>
        </div>
    </div>
</div>


<div class="container mt-5">
    <h5 class="text-center fw-bold mb-4" style="color: #2c3e50;">Featured Categories</h5>
    
    <div class="position-relative">
    
        <button class="cat-arrow left-arrow"><i class="fas fa-chevron-left"></i></button>

        <div class="d-flex justify-content-between overflow-auto no-scrollbar gap-2 px-1">
            
         
            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/honey-icon.png" alt="Honey">
                </div>
                <p>Honey</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/dates-icon.png" alt="Dates">
                </div>
                <p>Dates</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/spices-icon.png" alt="Spices">
                </div>
                <p>Spices</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/nuts-icon.png" alt="Nuts">
                </div>
                <p>Nuts & Seeds</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/beverage-icon.png" alt="Beverage">
                </div>
                <p>Beverage</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/rice-icon.png" alt="Rice">
                </div>
                <p>Rice</p>
            </div>

            <div class="cat-item">
                <div class="cat-box shadow-sm border">
                    <img src="https://ghorerbazar.com/wp-content/uploads/2022/01/flours-icon.png" alt="Flours">
                </div>
                <p>Flours & Lentils</p>
            </div>

        </div>

        <button class="cat-arrow right-arrow"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<style>
    /* Hero Section Fixes */
    .rounded-4 { border-radius: 15px !important; }
    .custom-nav { width: 40px; height: 40px; background: white; border-radius: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; color: #f39c12; margin: 0 15px; }
    .custom-dots button { width: 8px !important; height: 8px !important; border-radius: 50%; background-color: #f39c12 !important; }

    /* Category Section Fixes (As per image_1ef417.jpg) */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .cat-item { text-align: center; min-width: 110px; }
    .cat-box { 
        background: white; 
        border-radius: 15px; 
        width: 100px; 
        height: 100px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        margin: 0 auto 10px;
        transition: 0.3s;
    }
    .cat-box img { width: 60px; height: 60px; object-fit: contain; }
    .cat-item p { font-size: 13px; font-weight: 500; color: #444; }

    /* Arrows for Categories */
    .cat-arrow {
        position: absolute;
        top: 40%;
        width: 32px;
        height: 32px;
        background: #f39c12;
        color: white;
        border: none;
        border-radius: 50%;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .left-arrow { left: -15px; }
    .right-arrow { right: -15px; }

    .cat-box:hover { transform: translateY(-5px); border-color: #f39c12 !important; }
</style>
